<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>KVLBRZ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                   'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Slideshow ─────────────────────────────── */
    .slideshow { position: fixed; inset: 0; z-index: 0; background: #000; }
    .slide {
      position: absolute; inset: 0;
      background-size: cover; background-position: center; background-color: #000;
      opacity: 0; transition: opacity 1.8s ease;
    }
    .slide.active { opacity: 1; }
    /* Overlay: 0.58 během animace, JS ho sníží na 0.05 při odletu KVLBRZ */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.58); z-index: 1; }

    /* ── Intro ─────────────────────────────────── */
    #intro-wrap {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    #intro-full {
      display: flex; align-items: baseline;
      justify-content: center; flex-wrap: nowrap;
    }

    /*
      .il a .firm-name sdílejí stejnou font-size →
      FLIP animace nepotřebuje scale (žádná změna velikosti).
      overflow: hidden je nutné pro animaci šířky (width → 0).
    */
    .il {
      display: inline-block;
      overflow: hidden;
      font-size: clamp(1.1rem, 1.4vw, 9rem);
      font-weight: 700; text-transform: uppercase;
      color: #fff; line-height: 1.2;
      white-space: nowrap; flex-shrink: 0;
      text-shadow:
        0 0 2px rgba(30,30,30,0.7),
        0 0 5px rgba(30,30,30,0.5);
    }
    .il-sp {
      display: inline-block;
      overflow: hidden;
      width: 0.5em; flex-shrink: 0;
    }

    /* ── Hlavní UI ─────────────────────────────── */
    .ui {
      position: fixed; inset: 0; z-index: 2;
      pointer-events: none;
      padding: clamp(1.8rem, 3vw, 6rem) clamp(2rem, 3.5vw, 7rem);
      display: flex; flex-direction: column; justify-content: space-between;
    }

    /*
      KVLBRZ v rohu.
      Efekt matného skla: text-shadow vytvoří rozmazaný tmavý obrys
      přímo kolem každého písmene — bez ráměčku, bez boxu.
      3 vrstvy: ostrá ~2 px + střední ~5 px + měkká ~10 px.
    */
    .firm-name {
      pointer-events: all; color: #fff;
      font-size: clamp(1.1rem, 1.4vw, 9rem);
      font-weight: 700; text-transform: uppercase;
      line-height: 1.2; white-space: nowrap;
      align-self: flex-start;
      text-shadow:
        0 0 2px rgba(30,30,30,0.7),
        0 0 5px rgba(30,30,30,0.5);
      opacity: 0;
    }
    .firm-name.visible { opacity: 1; }

    /* ── Kontakty ──────────────────────────────── */
    .contacts {
      display: flex; flex-direction: row;
      justify-content: space-between; align-items: flex-end; width: 100%;
    }
    .contact { pointer-events: all; color: #fff; }
    .contact:last-child { text-align: right; }

    /*
      Totéž pro jméno kontaktu: obrys 2–5 px bez boxu.
    */
    .contact-name {
      font-size: clamp(0.75rem, 0.82vw, 3rem);
      font-weight: 600; letter-spacing: 0.05em;
      text-transform: uppercase; margin-bottom: 0.45rem;
      text-shadow:
        0 0 2px rgba(30,30,30,0.7),
        0 0 5px rgba(30,30,30,0.5);
    }
    .contact-detail {
      font-size: clamp(0.7rem, 0.75vw, 2.5rem);
      font-weight: 400; letter-spacing: 0.03em;
      line-height: 1.8; color: rgba(255,255,255,0.85);
      text-shadow:
        0 0 2px rgba(30,30,30,0.7),
        0 0 5px rgba(30,30,30,0.5);
    }
    .contact-detail a {
      color: rgba(255,255,255,0.85); text-decoration: none; transition: color 0.25s;
    }
    .contact-detail a:hover { color: #fff; }

    /* ── Mobil ─────────────────────────────────── */
    @media (max-width: 680px) {
      .ui { padding: 2rem 1.8rem; }
      .il, .firm-name { font-size: clamp(1rem, 4.5vw, 2rem); }
      .contacts { flex-direction: column; align-items: flex-start; gap: 1.4rem; }
      .contact:last-child { text-align: left; }
      .contact-name   { font-size: 0.85rem; }
      .contact-detail { font-size: 0.80rem; }
    }
  </style>
</head>
<body>

  <!-- Slideshow ──────────────────────────────── -->
  <div class="slideshow">
    <div class="slide active" style="background-image:url('images/slide1.jpg')"></div>
    <div class="slide"        style="background-image:url('images/slide2.jpg')"></div>
    <div class="slide"        style="background-image:url('images/slide3.jpg')"></div>
    <!--
      Přidat obrázek: <div class="slide" style="background-image:url('images/slide4.jpg')"></div>
      Video:
      <div class="slide" style="background-image:none">
        <video autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover">
          <source src="images/video1.mp4" type="video/mp4">
        </video>
      </div>
    -->
  </div>
  <div class="overlay"></div>

  <!-- Intro ──────────────────────────────────────
       .il-k = zůstane (K V L B R Z)
       .il-f = zmizí (width + opacity → 0)
       .il-sp = mezera (width → 0)
  -->
  <div id="intro-wrap">
    <div id="intro-full">
      <!-- KOVALYUK -->
      <span class="il il-k">K</span><span class="il il-f">O</span><span class="il il-k">V</span><span class="il il-f">A</span><span class="il il-k">L</span><span class="il il-f">Y</span><span class="il il-f">U</span><span class="il il-f">K</span>
      <span class="il-sp"></span>
      <!-- BEREZOVSKYI -->
      <span class="il il-k">B</span><span class="il il-f">E</span><span class="il il-k">R</span><span class="il il-f">E</span><span class="il il-k">Z</span><span class="il il-f">O</span><span class="il il-f">V</span><span class="il il-f">S</span><span class="il il-f">K</span><span class="il il-f">Y</span><span class="il il-f">I</span>
      <span class="il-sp"></span>
      <!-- ARCHITEKTI -->
      <span class="il il-f">A</span><span class="il il-f">R</span><span class="il il-f">C</span><span class="il il-f">H</span><span class="il il-f">I</span><span class="il il-f">T</span><span class="il il-f">E</span><span class="il il-f">K</span><span class="il il-f">T</span><span class="il il-f">I</span>
    </div>
  </div>

  <!-- Hlavní UI ──────────────────────────────── -->
  <div class="ui">
    <div class="firm-name" id="firmName">KVLBRZ</div>

    <div class="contacts">
      <div class="contact">
        <div class="contact-name">Bohdan Berezovskyi</div>
        <div class="contact-detail">
          777 677 184<br />
          <a href="mailto:berezovskyi@kvlbrz.com">berezovskyi@kvlbrz.com</a>
        </div>
      </div>
      <div class="contact">
        <div class="contact-name">Oleg Kovalyuk</div>
        <div class="contact-detail">
          773 601 996<br />
          <a href="mailto:kovalyuk@kvlbrz.com">kovalyuk@kvlbrz.com</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ── Slideshow ──────────────────────────────── */
    (function () {
      var slides = document.querySelectorAll('.slide');
      var cur = 0;
      setInterval(function () {
        slides[cur].classList.remove('active');
        cur = (cur + 1) % slides.length;
        slides[cur].classList.add('active');
      }, 6000);
    })();

    /* ── Intro animace ──────────────────────────────────────────────────
      Časová osa
      ──────────
        0.0 s  fáze 1: KOVALYUK BEREZOVSKYI ARCHITEKTI uprostřed
        2.0 s  fáze 2: fade + collapse šířky nežádoucích písmen (2 s)
                       → flexbox průběžně centruje zbývající K V L B R Z
        4.0 s  KVLBRZ srovnáno do středu
        4.5 s  fáze 3: FLIP – firm-name odletí do levého horního rohu
                       (čistý translate, žádná změna velikosti, 1.5 s)
        6.0 s  úklid DOM
    ────────────────────────────────────────────────────────────────────── */
    (function () {
      var introWrap = document.getElementById('intro-wrap');
      var introFull = document.getElementById('intro-full');
      var firmEl    = document.getElementById('firmName');

      var fadeEls  = introFull.querySelectorAll('.il-f');
      var spaceEls = introFull.querySelectorAll('.il-sp');
      var keepEls  = introFull.querySelectorAll('.il-k');

      /* ─ FÁZE 2 (t = 2 s): fade + width collapse ─ */
      setTimeout(function () {

        /* Zafixovat šířky před animací */
        var allFade = Array.from(fadeEls).concat(Array.from(spaceEls));
        allFade.forEach(function (el) {
          el.style.width = el.getBoundingClientRect().width + 'px';
        });
        void introFull.offsetWidth;

        fadeEls.forEach(function (el) {
          el.style.transition = 'opacity 2s ease, width 2s cubic-bezier(0.4, 0, 0.2, 1)';
          el.style.opacity    = '0';
          el.style.width      = '0';
        });
        spaceEls.forEach(function (el) {
          el.style.transition = 'width 2s cubic-bezier(0.4, 0, 0.2, 1)';
          el.style.width      = '0';
        });

      }, 2000);

      /* ─ FÁZE 3 (t = 4.5 s): FLIP – přesun do rohu ─ */
      setTimeout(function () {

        /* A – Změřit pozici skupiny K V L B R Z */
        var rects   = Array.from(keepEls).map(function (el) {
          return el.getBoundingClientRect();
        });
        var gL      = Math.min.apply(null, rects.map(function (r) { return r.left;   }));
        var gT      = Math.min.apply(null, rects.map(function (r) { return r.top;    }));
        var gR      = Math.max.apply(null, rects.map(function (r) { return r.right;  }));
        var gB      = Math.max.apply(null, rects.map(function (r) { return r.bottom; }));
        var groupCx = (gL + gR) / 2;
        var groupCy = (gT + gB) / 2;

        /* B – Změřit přirozenou pozici firm-name */
        var fRect  = firmEl.getBoundingClientRect();
        var firmCx = fRect.left + fRect.width  / 2;
        var firmCy = fRect.top  + fRect.height / 2;

        /* C – Čistý translate (bez scale – font-size je identická) */
        var dx = groupCx - firmCx;
        var dy = groupCy - firmCy;

        /* D – Synchronní přepnutí */
        keepEls.forEach(function (el) { el.style.opacity = '0'; });
        introWrap.style.opacity = '0';

        firmEl.style.transition = 'none';
        firmEl.style.transform  = 'translate(' + dx + 'px, ' + dy + 'px)';
        firmEl.style.opacity    = '1';

        /* E – Flush layoutu */
        void firmEl.offsetHeight;

        /* F – Spustit animaci + synchronně začít zesvětlovat overlay */
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            firmEl.style.transition = 'transform 1.5s cubic-bezier(0.25, 0.1, 0.25, 1)';
            firmEl.style.transform  = 'none';

            /* Overlay: plynulé snížení z 0.58 → 0.05 za stejnou dobu jako let */
            var overlayEl = document.querySelector('.overlay');
            overlayEl.style.transition = 'background 1.5s ease';
            overlayEl.style.background = 'rgba(0,0,0,0.05)';
          });
        });

        /* G – Úklid */
        setTimeout(function () {
          introWrap.remove();
          firmEl.classList.add('visible');
          firmEl.style.transition = '';
          firmEl.style.transform  = '';
          firmEl.style.opacity    = '';
        }, 1800);

      }, 4500);

    })();
  </script>

</body>
</html>
