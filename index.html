<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Safari lišta + pozadí při načítání = černá -->
  <meta name="theme-color" content="#000000" />
  <title>Berezovskyi Kovalyuk Architekti</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000; /* černé pozadí – žádné bílé záblesky */
      /* Apple systémový font */
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Slideshow ─────────────────────────────── */
    .slideshow {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #000; /* záloha když se obrázek ještě načítá */
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-color: #000; /* žádné šedé/modré záblesky mezi slidy */
      opacity: 0;
      transition: opacity 1.8s ease;
    }
    .slide.active { opacity: 1; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.38);
      z-index: 1;
    }

    /* ── UI vrstva ─────────────────────────────── */
    .ui {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .corner {
      position: absolute;
      pointer-events: all;
      color: #fff;
    }

    /* Nahoře vlevo */
    .corner--tl {
      top: 3.5rem;
      left: 4rem;
    }

    /* Dole vlevo */
    .corner--bl {
      bottom: 3.5rem;
      left: 4rem;
    }

    /* Dole vpravo */
    .corner--br {
      bottom: 3.5rem;
      right: 4rem;
      text-align: right;
    }

    /* Název firmy */
    .firm-name {
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.4;
      white-space: nowrap;
    }

    /* Jméno jednatele */
    .contact-name {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.45rem;
    }

    /* Telefon + email */
    .contact-detail {
      font-size: 0.88rem;
      font-weight: 300;
      letter-spacing: 0.03em;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.82);
    }

    .contact-detail a {
      color: rgba(255, 255, 255, 0.82);
      text-decoration: none;
      transition: color 0.25s;
    }
    .contact-detail a:hover {
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- Slideshow pozadí -->
  <div class="slideshow" id="slideshow">
    <div class="slide active" style="background-image: url('images/slide1.jpg')"></div>
    <div class="slide"        style="background-image: url('images/slide2.jpg')"></div>
    <div class="slide"        style="background-image: url('images/slide3.jpg')"></div>
    <!--
      Přidání dalšího obrázku:
      <div class="slide" style="background-image: url('images/slide4.jpg')"></div>

      Video místo obrázku:
      <div class="slide" style="background-image: none">
        <video autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover">
          <source src="images/video1.mp4" type="video/mp4">
        </video>
      </div>
    -->
  </div>

  <!-- Překryv -->
  <div class="overlay"></div>

  <!-- Obsah -->
  <div class="ui">

    <!-- Nahoře vlevo: název firmy -->
    <div class="corner corner--tl">
      <div class="firm-name">Berezovskyi Kovalyuk Architekti</div>
      <!--
        Až budeš mít .gif, smaž řádek výše a odkomentuj:
        <img src="images/logo.gif" alt="Berezovskyi Kovalyuk Architekti" style="height: 56px; width: auto;" />
      -->
    </div>

    <!-- Dole vlevo: Bohdan -->
    <div class="corner corner--bl">
      <div class="contact-name">Bohdan Berezovskyi</div>
      <div class="contact-detail">
        777 677 184<br />
        <a href="mailto:berezovskyi@kvlbrz.com">berezovskyi@kvlbrz.com</a>
      </div>
    </div>

    <!-- Dole vpravo: Oleg -->
    <div class="corner corner--br">
      <div class="contact-name">Oleg Kovalyuk</div>
      <div class="contact-detail">
        773 601 996<br />
        <a href="mailto:kovalyuk@kvlbrz.com">kovalyuk@kvlbrz.com</a>
      </div>
    </div>

  </div>

  <script>
    (function () {
      const slides = document.querySelectorAll('.slide');
      let current = 0;
      function next() {
        slides[current].classList.remove('active');
        current = (current + 1) % slides.length;
        slides[current].classList.add('active');
      }
      setInterval(next, 6000);
    })();
  </script>

</body>
</html>
