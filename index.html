<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>KVLBRZ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                   'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Slideshow ─────────────────────────────── */
    .slideshow { position: fixed; inset: 0; z-index: 0; background: #000; }
    .slide {
      position: absolute; inset: 0;
      background-size: cover; background-position: center; background-color: #000;
      opacity: 0; transition: opacity 1.8s ease;
    }
    .slide.active { opacity: 1; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.42); z-index: 1; }

    /* ── Intro: full-screen flex bez transformu ───
       (bez transform = position:fixed na klonech
        bude relativní k viewportu, ne k tomuto prvku) */
    #intro-wrap {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    #intro-full {
      display: flex; align-items: baseline;
      justify-content: center; flex-wrap: nowrap;
    }

    .il {
      display: inline-block; overflow: hidden;
      font-size: clamp(1.1rem, 1.4vw, 9rem);
      font-weight: 700; text-transform: uppercase;
      color: #fff; line-height: 1.2;
      white-space: nowrap; flex-shrink: 0;
    }
    .il-sp { display: inline-block; width: 0.5em; flex-shrink: 0; }

    /* ── Hlavní UI ─────────────────────────────── */
    .ui {
      position: fixed; inset: 0; z-index: 2;
      pointer-events: none;
      padding: clamp(1.8rem, 3vw, 6rem) clamp(2rem, 3.5vw, 7rem);
      display: flex; flex-direction: column; justify-content: space-between;
    }

    .firm-name {
      pointer-events: all; color: #fff;
      font-size: clamp(1rem, 1.04vw, 5rem);
      font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; line-height: 1.2;
      white-space: nowrap; align-self: flex-start;
      opacity: 0; transition: opacity 0.5s ease;
    }
    .firm-name.visible { opacity: 1; }
    /* fn-l = cílová pozice každého písmene pro animaci */
    .fn-l { display: inline; }

    /* Kontakty */
    .contacts {
      display: flex; flex-direction: row;
      justify-content: space-between; align-items: flex-end; width: 100%;
    }
    .contact { pointer-events: all; color: #fff; }
    .contact:last-child { text-align: right; }
    .contact-name {
      font-size: clamp(0.75rem, 0.82vw, 3rem);
      font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.45rem;
    }
    .contact-detail {
      font-size: clamp(0.7rem, 0.75vw, 2.5rem);
      font-weight: 400; letter-spacing: 0.03em; line-height: 1.8; color: rgba(255,255,255,0.85);
    }
    .contact-detail a { color: rgba(255,255,255,0.85); text-decoration: none; transition: color 0.25s; }
    .contact-detail a:hover { color: #fff; }

    /* ── Mobil ─────────────────────────────────── */
    @media (max-width: 680px) {
      .ui { padding: 2rem 1.8rem; }
      .il { font-size: clamp(1rem, 4.5vw, 2rem); }
      .firm-name { font-size: 1rem; }
      .contacts { flex-direction: column; align-items: flex-start; gap: 1.4rem; }
      .contact:last-child { text-align: left; }
      .contact-name   { font-size: 0.85rem; }
      .contact-detail { font-size: 0.80rem; }
    }
  </style>
</head>
<body>

  <!-- Slideshow ──────────────────────────────── -->
  <div class="slideshow">
    <div class="slide active" style="background-image:url('images/slide1.jpg')"></div>
    <div class="slide"        style="background-image:url('images/slide2.jpg')"></div>
    <div class="slide"        style="background-image:url('images/slide3.jpg')"></div>
    <!--
      Přidat obrázek: <div class="slide" style="background-image:url('images/slide4.jpg')"></div>
      Video: <div class="slide" style="background-image:none">
               <video autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover">
                 <source src="images/video1.mp4" type="video/mp4">
               </video>
             </div>
    -->
  </div>
  <div class="overlay"></div>

  <!-- Intro (fáze 1–2) ───────────────────────── -->
  <div id="intro-wrap">
    <div id="intro-full">
      <!-- KOVALYUK: .il-k = zůstane, .il-f = zmizí -->
      <span class="il il-k">K</span><span class="il il-f">O</span><span class="il il-k">V</span><span class="il il-f">A</span><span class="il il-k">L</span><span class="il il-f">Y</span><span class="il il-f">U</span><span class="il il-f">K</span>
      <span class="il-sp"></span>
      <!-- BEREZOVSKYI -->
      <span class="il il-k">B</span><span class="il il-f">E</span><span class="il il-k">R</span><span class="il il-f">E</span><span class="il il-k">Z</span><span class="il il-f">O</span><span class="il il-f">V</span><span class="il il-f">S</span><span class="il il-f">K</span><span class="il il-f">Y</span><span class="il il-f">I</span>
      <span class="il-sp"></span>
      <!-- ARCHITEKTI -->
      <span class="il il-f">A</span><span class="il il-f">R</span><span class="il il-f">C</span><span class="il il-f">H</span><span class="il il-f">I</span><span class="il il-f">T</span><span class="il il-f">E</span><span class="il il-f">K</span><span class="il il-f">T</span><span class="il il-f">I</span>
    </div>
  </div>

  <!-- Hlavní UI ──────────────────────────────── -->
  <div class="ui">
    <!--
      fn-l = po jednom písmenu pro měření cílových pozic animace.
      Pořadí odpovídá .il-k v intro: K V L B R Z
    -->
    <div class="firm-name" id="firmName">
      <span class="fn-l">K</span><span class="fn-l">V</span><span class="fn-l">L</span><span class="fn-l">B</span><span class="fn-l">R</span><span class="fn-l">Z</span>
    </div>

    <div class="contacts">
      <div class="contact">
        <div class="contact-name">Bohdan Berezovskyi</div>
        <div class="contact-detail">
          777 677 184<br />
          <a href="mailto:berezovskyi@kvlbrz.com">berezovskyi@kvlbrz.com</a>
        </div>
      </div>
      <div class="contact">
        <div class="contact-name">Oleg Kovalyuk</div>
        <div class="contact-detail">
          773 601 996<br />
          <a href="mailto:kovalyuk@kvlbrz.com">kovalyuk@kvlbrz.com</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ── Slideshow ──────────────────────────────── */
    (function () {
      var slides = document.querySelectorAll('.slide');
      var cur = 0;
      setInterval(function () {
        slides[cur].classList.remove('active');
        cur = (cur + 1) % slides.length;
        slides[cur].classList.add('active');
      }, 6000);
    })();

    /* ── Intro animace ──────────────────────────── */
    (function () {
      var introWrap     = document.getElementById('intro-wrap');
      var introFull     = document.getElementById('intro-full');
      var firmEl        = document.getElementById('firmName');
      var fadeEls       = introFull.querySelectorAll('.il-f');
      var keepEls       = introFull.querySelectorAll('.il-k');   // K V L B R Z
      var targetEls     = firmEl.querySelectorAll('.fn-l');      // K V L B R Z (cíle)

      /*
        Časová osa
        ──────────
        0.0 s  fáze 1: zobrazení KOVALYUK BEREZOVSKYI ARCHITEKTI
        2.0 s  fáze 2: fade-out nepoužitých písmen (trvá 2 s)
        2.5 s  fáze 3: K V L B R Z letí do levého horního rohu (trvá 2 s)
        4.3 s           firma-name se vynoří, klony zhasnou
        4.8 s           úklid DOM
      */

      /* ── FÁZE 2 (t = 2 s) ── */
      setTimeout(function () {
        fadeEls.forEach(function (el) {
          el.style.transition = 'opacity 2s ease';
          el.style.opacity    = '0';
        });
      }, 2000);

      /* ── FÁZE 3 (t = 2,5 s) ── */
      setTimeout(function () {

        /*
          KROK 1 – Změřit vše PŘED zásahem do DOM.
          getBoundingClientRect() vrací viewport-relativní souřadnice.
        */
        var data = Array.from(keepEls).map(function (el, i) {
          var srcRect = el.getBoundingClientRect();
          var tgtRect = targetEls[i].getBoundingClientRect();
          var srcCs   = window.getComputedStyle(el);
          var tgtCs   = window.getComputedStyle(targetEls[i]);
          return {
            text       : el.textContent,
            srcLeft    : srcRect.left,
            srcTop     : srcRect.top,
            srcFontSize: parseFloat(srcCs.fontSize),
            tgtLeft    : tgtRect.left,
            tgtTop     : tgtRect.top,
            tgtFontSize: parseFloat(tgtCs.fontSize),
            fontFamily : srcCs.fontFamily,
            fontWeight : srcCs.fontWeight
          };
        });

        /*
          KROK 2 – Skrýt originály, schovat intro, vytvořit klony.
          Vše v jednom JS bloku → jeden paint snímek.
        */
        keepEls.forEach(function (el) { el.style.opacity = '0'; });
        introWrap.style.opacity = '0';

        var clones = data.map(function (d) {
          var c = document.createElement('span');
          c.textContent         = d.text;
          c.style.position      = 'fixed';
          c.style.left          = d.srcLeft     + 'px';
          c.style.top           = d.srcTop      + 'px';
          c.style.fontSize      = d.srcFontSize + 'px';
          c.style.fontWeight    = d.fontWeight;
          c.style.fontFamily    = d.fontFamily;
          c.style.lineHeight    = '1.2';
          c.style.color         = '#fff';
          c.style.textTransform = 'uppercase';
          c.style.whiteSpace    = 'nowrap';
          c.style.zIndex        = '20';
          c.style.pointerEvents = 'none';
          document.body.appendChild(c);
          return c;
        });

        /*
          KROK 3 – Čistý rAF loop: animujeme left / top / font-size
          přímo každý snímek – žádné CSS transitions, žádný záblesk.
        */
        var DURATION  = 2000; /* ms – délka letu */
        var startTime = null;
        var firmShown = false;

        function easeInOut(t) {
          return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        }

        function step(ts) {
          if (!startTime) startTime = ts;
          var elapsed  = ts - startTime;
          var progress = Math.min(elapsed / DURATION, 1);
          var ease     = easeInOut(progress);

          /* Ukázat firm-name 200 ms před přistáním */
          if (!firmShown && elapsed >= DURATION - 200) {
            firmShown = true;
            firmEl.classList.add('visible');
          }

          clones.forEach(function (clone, i) {
            var d = data[i];
            clone.style.left     = (d.srcLeft     + (d.tgtLeft     - d.srcLeft)     * ease) + 'px';
            clone.style.top      = (d.srcTop      + (d.tgtTop      - d.srcTop)      * ease) + 'px';
            clone.style.fontSize = (d.srcFontSize + (d.tgtFontSize - d.srcFontSize) * ease) + 'px';
          });

          if (progress < 1) {
            requestAnimationFrame(step);
          } else {
            /* Klony zhasnou po přistání */
            clones.forEach(function (c) {
              c.style.transition = 'opacity 0.3s ease';
              c.style.opacity    = '0';
            });
            /* Úklid po doznění fade */
            setTimeout(function () {
              introWrap.remove();
              clones.forEach(function (c) { c.remove(); });
            }, 400);
          }
        }

        requestAnimationFrame(step);

      }, 2500);

    })();
  </script>

</body>
</html>
