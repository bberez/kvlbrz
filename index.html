<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>Berezovskyi Kovalyuk Architekti</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                   'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Slideshow ─────────────────────────────── */
    .slideshow {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #000;
    }
    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-color: #000;
      opacity: 0;
      transition: opacity 1.8s ease;
    }
    .slide.active { opacity: 1; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.38);
      z-index: 1;
    }

    /* ── UI vrstva ─────────────────────────────── */
    .ui {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      padding: 3.5rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── Název firmy (nahoře vlevo) ─────────────── */
    .firm-name {
      pointer-events: all;
      color: #fff;
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.4;
      white-space: nowrap;
      align-self: flex-start;
    }

    /* ── Kontakty (dole – vlevo i vpravo) ─────── */
    .contacts {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-end;
      width: 100%;
    }

    .contact {
      pointer-events: all;
      color: #fff;
    }
    .contact:last-child {
      text-align: right;
    }

    .contact-name {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.45rem;
    }
    .contact-detail {
      font-size: 0.88rem;
      font-weight: 300;
      letter-spacing: 0.03em;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.82);
    }
    .contact-detail a {
      color: rgba(255, 255, 255, 0.82);
      text-decoration: none;
      transition: color 0.25s;
    }
    .contact-detail a:hover { color: #fff; }

    /* ── Mobilní layout ────────────────────────── */
    @media (max-width: 680px) {
      .ui {
        padding: 2.2rem 1.8rem;
      }

      /* Název: každé slovo na vlastní řádek */
      .firm-name {
        font-size: 1rem;
        white-space: normal;
        /* Úzký blok = přirozené zalomení po každém slově */
        max-width: 5.5rem;
        line-height: 1.6;
      }

      /* Kontakty: pod sebe, zarovnání vlevo */
      .contacts {
        flex-direction: column;
        align-items: flex-start;
        gap: 1.4rem;
      }
      .contact:last-child {
        text-align: left;
      }

      .contact-name { font-size: 0.82rem; }
      .contact-detail { font-size: 0.78rem; }
    }
  </style>
</head>
<body>

  <!-- Slideshow pozadí -->
  <div class="slideshow">
    <div class="slide active" style="background-image: url('images/slide1.jpg')"></div>
    <div class="slide"        style="background-image: url('images/slide2.jpg')"></div>
    <div class="slide"        style="background-image: url('images/slide3.jpg')"></div>
    <!--
      Přidání dalšího obrázku:
      <div class="slide" style="background-image: url('images/slide4.jpg')"></div>

      Video místo obrázku:
      <div class="slide" style="background-image: none">
        <video autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover">
          <source src="images/video1.mp4" type="video/mp4">
        </video>
      </div>
    -->
  </div>

  <!-- Překryv -->
  <div class="overlay"></div>

  <!-- Obsah -->
  <div class="ui">

    <!-- Nahoře vlevo: název firmy -->
    <div class="firm-name">
      Berezovskyi Kovalyuk Architekti
      <!--
        Až budeš mít .gif, smaž řádek výše a odkomentuj:
        <img src="images/logo.gif" alt="Berezovskyi Kovalyuk Architekti"
             style="height: 56px; width: auto; display: block;" />
      -->
    </div>

    <!-- Dole: oba kontakty -->
    <div class="contacts">

      <!-- Dole vlevo: Bohdan -->
      <div class="contact">
        <div class="contact-name">Bohdan Berezovskyi</div>
        <div class="contact-detail">
          777 677 184<br />
          <a href="mailto:berezovskyi@kvlbrz.com">berezovskyi@kvlbrz.com</a>
        </div>
      </div>

      <!-- Dole vpravo: Oleg -->
      <div class="contact">
        <div class="contact-name">Oleg Kovalyuk</div>
        <div class="contact-detail">
          773 601 996<br />
          <a href="mailto:kovalyuk@kvlbrz.com">kovalyuk@kvlbrz.com</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    (function () {
      const slides = document.querySelectorAll('.slide');
      let current = 0;
      function next() {
        slides[current].classList.remove('active');
        current = (current + 1) % slides.length;
        slides[current].classList.add('active');
      }
      setInterval(next, 6000);
    })();
  </script>

</body>
</html>
