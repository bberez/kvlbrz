<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>Berezovskyi Kovalyuk Architekti</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                   'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Intro overlay ─────────────────────────── */
    #intro {
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.7s ease;
    }
    #intro.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Intro písmena */
    .intro-letters {
      display: flex;
      align-items: center;
      gap: 0.05em;
    }
    .il {
      font-size: clamp(3.5rem, 11vw, 6.5rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: inline-block;
      will-change: transform, opacity;
      /* přechod se aplikuje jen při animaci (ne při inicializaci) */
      transition: none;
    }
    .il.animating {
      transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity  0.7s ease;
    }

    /* ── Slideshow ─────────────────────────────── */
    .slideshow {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #000;
    }
    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-color: #000;
      opacity: 0;
      transition: opacity 1.8s ease;
    }
    .slide.active { opacity: 1; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.38);
      z-index: 1;
    }

    /* ── UI vrstva ─────────────────────────────── */
    .ui {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      padding: 3.5rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── Název firmy ───────────────────────────── */
    .firm-name {
      pointer-events: all;
      color: #fff;
      font-size: 1.25rem;
      font-weight: 600;          /* tučnější */
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.4;
      white-space: nowrap;
      align-self: flex-start;
      /* skrytý dokud intro neskončí */
      opacity: 0;
      transition: opacity 0.7s ease;
    }
    .firm-name.visible { opacity: 1; }

    /* ── Kontakty ─────────────────────────────── */
    .contacts {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-end;
      width: 100%;
    }

    .contact {
      pointer-events: all;
      color: #fff;
    }
    .contact:last-child { text-align: right; }

    .contact-name {
      font-size: 0.95rem;
      font-weight: 600;          /* tučnější */
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.45rem;
    }
    .contact-detail {
      font-size: 0.88rem;
      font-weight: 400;          /* bylo 300, teď čitelnější */
      letter-spacing: 0.03em;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.85);
    }
    .contact-detail a {
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      transition: color 0.25s;
    }
    .contact-detail a:hover { color: #fff; }

    /* ── Mobilní layout ────────────────────────── */
    @media (max-width: 680px) {
      .ui { padding: 2.2rem 1.8rem; }

      .firm-name {
        font-size: 1rem;
        white-space: normal;
        max-width: 5.5rem;
        line-height: 1.6;
      }

      .contacts {
        flex-direction: column;
        align-items: flex-start;
        gap: 1.4rem;
      }
      .contact:last-child { text-align: left; }

      .contact-name  { font-size: 0.85rem; }
      .contact-detail { font-size: 0.80rem; }
    }
  </style>
</head>
<body>

  <!-- ═══ Intro animace ════════════════════════ -->
  <div id="intro">
    <div class="intro-letters">
      <span class="il" id="il-k">K</span>
      <span class="il" id="il-v">V</span>
      <span class="il" id="il-l">L</span>
      <span class="il" id="il-b">B</span>
      <span class="il" id="il-r">R</span>
      <span class="il" id="il-z">Z</span>
    </div>
  </div>

  <!-- ═══ Slideshow ════════════════════════════ -->
  <div class="slideshow">
    <div class="slide active" style="background-image: url('images/slide1.jpg')"></div>
    <div class="slide"        style="background-image: url('images/slide2.jpg')"></div>
    <div class="slide"        style="background-image: url('images/slide3.jpg')"></div>
    <!--
      Přidání obrázku:
      <div class="slide" style="background-image: url('images/slide4.jpg')"></div>

      Video:
      <div class="slide" style="background-image:none">
        <video autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover">
          <source src="images/video1.mp4" type="video/mp4">
        </video>
      </div>
    -->
  </div>

  <!-- Překryv -->
  <div class="overlay"></div>

  <!-- ═══ Obsah ════════════════════════════════ -->
  <div class="ui">

    <!-- Nahoře vlevo: název firmy -->
    <div class="firm-name" id="firmName">
      Berezovskyi Kovalyuk Architekti
      <!--
        Až budeš mít .gif, smaž řádek výše a odkomentuj:
        <img src="images/logo.gif" alt="Berezovskyi Kovalyuk Architekti"
             style="height:56px;width:auto;display:block;" />
      -->
    </div>

    <!-- Dole: kontakty -->
    <div class="contacts">

      <div class="contact">
        <div class="contact-name">Bohdan Berezovskyi</div>
        <div class="contact-detail">
          777 677 184<br />
          <a href="mailto:berezovskyi@kvlbrz.com">berezovskyi@kvlbrz.com</a>
        </div>
      </div>

      <div class="contact">
        <div class="contact-name">Oleg Kovalyuk</div>
        <div class="contact-detail">
          773 601 996<br />
          <a href="mailto:kovalyuk@kvlbrz.com">kovalyuk@kvlbrz.com</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    /* ── Slideshow ──────────────────────────────── */
    (function () {
      const slides = document.querySelectorAll('.slide');
      let current = 0;
      function next() {
        slides[current].classList.remove('active');
        current = (current + 1) % slides.length;
        slides[current].classList.add('active');
      }
      setInterval(next, 6000);
    })();

    /* ── Intro animace ──────────────────────────── */
    (function () {
      const intro    = document.getElementById('intro');
      const firmEl   = document.getElementById('firmName');

      // Pořadí: K V L B R Z
      // KVL → KOVALYUK (druhé slovo v názvu, ~55 % šířky textu)
      // BRZ → BEREZOVSKYI (první slovo, ~15 % šířky textu)
      const letterIds = ['il-k','il-v','il-l','il-b','il-r','il-z'];
      const letters   = letterIds.map(id => document.getElementById(id));

      function runAnimation() {
        // Souřadnice cílového textu (firma name je v DOM, jen neviditelná)
        const fr = firmEl.getBoundingClientRect();

        // Cílová středová pozice pro KVL → KOVALYUK oblast
        const kovalX = fr.left + fr.width * 0.58;
        const kovalY = fr.top  + fr.height * 0.5;

        // Cílová středová pozice pro BRZ → BEREZOVSKYI oblast
        const bereX  = fr.left + fr.width * 0.18;
        const bereY  = fr.top  + fr.height * 0.5;

        // Rozestup písmen v cíli
        const spread = 6;

        const targets = [
          // K, V, L → KOVALYUK
          { x: kovalX - spread * 1, y: kovalY },
          { x: kovalX,              y: kovalY },
          { x: kovalX + spread * 1, y: kovalY },
          // B, R, Z → BEREZOVSKYI
          { x: bereX - spread * 1,  y: bereY  },
          { x: bereX,               y: bereY  },
          { x: bereX + spread * 1,  y: bereY  },
        ];

        // Spuštění přechodů
        letters.forEach((el, i) => {
          const r  = el.getBoundingClientRect();
          const cx = r.left + r.width  / 2;
          const cy = r.top  + r.height / 2;
          const tx = targets[i].x - cx;
          const ty = targets[i].y - cy;

          el.classList.add('animating');
          el.style.transform = `translate(${tx}px, ${ty}px) scale(0.12)`;
          el.style.opacity   = '0';
        });

        // Zobrazení názvu firmy během příletu písmen
        setTimeout(() => firmEl.classList.add('visible'), 650);

        // Fade out intro overlay
        setTimeout(() => {
          intro.classList.add('hidden');
          setTimeout(() => intro.remove(), 750);
        }, 1000);
      }

      // Drž KVLBRZ 2 sekundy, pak animuj
      setTimeout(runAnimation, 2000);
    })();
  </script>

</body>
</html>
